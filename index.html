<!DOCTYPE html>
<html lang="uz">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>ZenTime | Pomodoro</title>
     <link rel="stylesheet" href="style.css">
</head>

<body>
     <div class="container">
          <div class="timer-card">
               <div class="header">
                    <h2 id="status">Focus Time</h2>
                    <button id="settings-toggle" class="icon-btn">⚙️</button>
               </div>

               <div class="visual-timer">
                    <svg viewBox="0 0 250 250">
                         <circle class="bg" cx="125" cy="125" r="110"></circle>
                         <circle class="progress" cx="125" cy="125" r="110"></circle>
                    </svg>
                    <div class="timer-text">
                         <span id="minutes">25</span>:<span id="seconds">00</span>
                    </div>
               </div>

               <div class="controls">
                    <button id="start-btn" class="main-btn">START</button>
                    <button id="reset-btn" class="secondary-btn">RESET</button>
               </div>
          </div>

          <div id="settings-modal" class="modal hidden">
               <div class="modal-content">
                    <h3>Settings (minutes)</h3>
                    <div class="input-group">
                         <label>Focus: <input type="number" id="work-input" value="25"></label>
                         <label>Break: <input type="number" id="break-input" value="5"></label>
                    </div>
                    <button id="save-settings" class="main-btn">Apply</button>
               </div>
          </div>
     </div>

     <audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
     <script src="script.js"></script>
</body>

</html>
