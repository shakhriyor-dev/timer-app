<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="timer-display">
            <span id="minutes">25</span>:<span id="seconds">00</span>
        </div>
        <p id="status">Work Session</p>
        <div class="controls">
            <button id="start-btn" class="uiverse-btn">START</button>
            <button id="reset-btn" class="uiverse-btn secondary">RESET</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
