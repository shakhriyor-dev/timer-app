<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Timer</title>
     <link rel="stylesheet" href="style.css">
</head>

<body>
     <div class="card">
          <div class="timer-display">
               <span id="minutes">25</span>:<span id="seconds">00</span>
          </div>
          <p id="status">Work Time</p>
          <div class="controls">
               <button id="start-btn" class="uiverse-btn">Start</button>
               <button id="reset-btn" class="uiverse-btn secondary">Reset</button>
          </div>
     </div>



     <script src="script.js"></script>
</body>

</html>
